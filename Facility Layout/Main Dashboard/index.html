<!DOCTYPE html>
<html lang="en">
<head>
  <!-- =========================
       01 - HEAD
  ========================== -->

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Main Dashboard</title>

  <style>
    /* =========================
       02 - GLOBAL STYLE
    ========================== */

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      min-height: 100vh;
      padding: 10px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .app {
      width: 100%;
      max-width: 430px;
      background: #ffffff;
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.18);
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .title {
      font-size: 21px;
      font-weight: 900;
      margin: 0;
      line-height: 1.1;
    }

    .tag {
      font-size: 12px;
      color: #555;
      margin-top: 4px;
      font-weight: 700;
    }

    .back-btn {
      border: none;
      background: #222;
      color: white;
      border-radius: 10px;
      padding: 8px 10px;
      font-weight: 800;
      cursor: pointer;
      white-space: nowrap;
    }

    .facility-btn {
      width: 100%;
      border: none;
      background: #f4c542;
      color: #111;
      border-radius: 14px;
      padding: 16px 12px;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
      margin: 8px 0;
      box-shadow: 0 3px 8px rgba(0,0,0,0.18);
      text-align: center;
    }

    .facility-btn:active,
    .back-btn:active {
      transform: scale(0.98);
    }

    .version {
      margin-top: 14px;
      text-align: center;
      font-size: 11px;
      color: #777;
    }
  </style>
</head>

<body>
  <!-- =========================
       03 - APP SHELL
  ========================== -->

  <main class="app">
    <div class="top-row">
      <div>
        <h1 class="title">Main Dashboard</h1>
        <div class="tag">Facility Layout</div>
      </div>

      <button class="back-btn" onclick="goBack()">Back</button>
    </div>

    <button class="facility-btn" onclick="openGmsFacility()">
      GMS
    </button>

    <div class="version">
      Updated: 2026-05-23 09:30 AM • Facility Layout/Main Dashboard/index.html
    </div>
  </main>

  <script>
    /* =========================
       04 - FACILITY NAVIGATION
    ========================== */

    function openGmsFacility() {
      const facilityId = "GMS";
      const facilityName = "Grace Manor Suites";

      const url =
        "../GMS/index.html" +
        "?facilityId=" + encodeURIComponent(facilityId) +
        "&facilityName=" + encodeURIComponent(facilityName);

      window.location.href = url;
    }

    /* =========================
       05 - HELPERS
    ========================== */

    function goBack() {
      window.history.back();
    }
  </script>
</body>
</html>
