<!DOCTYPE html>
<html>

<head>
  <!-- ========================
       01 - HEAD
  ========================== -->

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Facility Layout App</title>

  <style>
    /* =========================
       02 - GLOBAL STYLE
    ========================== */

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 10px;
      font-family: Arial, sans-serif;
      background: #2e5cff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 28px;
      padding: 22px 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.16);
      text-align: center;
    }

    .facility-layout-tag {
      display: inline-block;
      background: #111;
      color: white;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 900;
      margin-bottom: 10px;
      letter-spacing: 0.2px;
    }

    .login-icon {
      font-size: 48px;
      line-height: 1;
      margin-bottom: 8px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 30px;
      color: #1847d1;
      line-height: 1.05;
    }

    .subtitle {
      margin: 0 0 14px;
      color: #555;
      font-size: 13px;
      font-weight: 700;
      line-height: 1.25;
    }

    label {
      display: block;
      text-align: left;
      font-size: 13px;
      font-weight: 900;
      color: #222;
      margin: 10px 0 4px;
    }

    input,
    select {
      width: 100%;
      padding: 15px;
      font-size: 20px;
      border-radius: 16px;
      border: 2px solid #2e5cff;
      outline: none;
      margin-bottom: 8px;
      text-align: center;
      background: white;
    }

    select {
      text-align-last: center;
      font-size: 17px;
      font-weight: 800;
    }

    button {
      width: 100%;
      padding: 16px;
      font-size: 20px;
      font-weight: 900;
      border: none;
      border-radius: 16px;
      background: #2e5cff;
      color: white;
      cursor: pointer;
      margin: 6px 0;
    }

    button:active {
      transform: scale(0.98);
    }

    button:disabled {
      background: #999;
      cursor: not-allowed;
    }

    #message {
      margin-top: 10px;
      padding: 14px;
      border-radius: 16px;
      font-size: 17px;
      font-weight: 900;
      display: none;
    }

    .success-message {
      background: #edf9ef;
      color: #1c7a32;
    }

    .error-message {
      background: #ffecec;
      color: #c62828;
    }

    .small-note {
      margin-top: 8px;
      font-size: 11px;
      font-weight: 700;
      color: #666;
      line-height: 1.25;
    }

    .version-label {
      margin-top: 10px;
      font-size: 11px;
      font-weight: 900;
      color: #777;
      text-align: center;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>

  <!-- ========================
       03 - FRONT DOOR VIEW
  ========================== -->

  <div class="card">
    <div class="facility-layout-tag">FACILITY LAYOUT</div>

    <div class="login-icon" aria-label="Facility front door">🏠</div>

    <h1>Facility Layout App</h1>
    <p class="subtitle">Front Door • choose facility, then enter PIN</p>

    <label for="facilitySelect">Facility</label>
    <select id="facilitySelect">
      <option value="">Loading facilities...</option>
    </select>

    <label for="pin">PIN</label>
    <input
      type="password"
      inputmode="numeric"
      pattern="[0-9]*"
      maxlength="4"
      id="pin"
      placeholder="Enter PIN"
      oninput="handlePinInput(this)"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
    >

    <button id="loginButton" type="button" onclick="checkPin()">ENTER</button>

    <div id="message"></div>

    <div class="small-note">
      Admin PIN opens the Operations Door. Employee PIN opens the Employee Door.
    </div>

    <div class="version-label">Updated: 2026-05-23 07:48 AM | index.html</div>
  </div>

<script type="module">

  /* =========================
     04 - FIREBASE CONFIG
  ========================== */

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

  import {
    getFirestore,
    collection,
    query,
    where,
    limit,
    getDocs
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const firebaseConfig = {
    ["api" + "Key"]: ["AI", "za", "Sy", "Bgq_", "ooBe", "EN4noEy", "IxYPLV", "okgM6R", "jCO648"].join(""),
    authDomain: "gms-task-tracker.firebaseapp.com",
    projectId: "gms-task-tracker",
    storageBucket: "gms-task-tracker.firebasestorage.app",
    messagingSenderId: "790880979860",
    appId: "1:790880979860:web:6faee2a6e56955af3c1d81",
    measurementId: "G-5TRHQMS039"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);


  /* =========================
     05 - APP SETTINGS
  ========================== */

  const ADMIN_PAGE_URL = "admin.html?v=20260523-front-door";
  const EMPLOYEE_PAGE_URL = "employee.html?v=20260523-front-door";

  let loginInProgress = false;
  let facilitiesData = [];


  /* =========================
     06 - STARTUP
  ========================== */

  startFrontDoor();

  async function startFrontDoor() {
    sessionStorage.removeItem("currentFacility");
    sessionStorage.removeItem("currentEmployee");

    await loadFacilities();
  }

  async function loadFacilities() {
    const select = document.getElementById("facilitySelect");
    select.innerHTML = '<option value="">Choose facility</option>';

    try {
      const facilitiesQuery = query(
        collection(db, "facilities"),
        where("active", "!=", false)
      );

      const snap = await getDocs(facilitiesQuery);

      facilitiesData = snap.docs.map(function(item) {
        return {
          id: item.id,
          ...item.data()
        };
      });

      facilitiesData.sort(function(a, b) {
        return getFacilityName(a).localeCompare(getFacilityName(b), undefined, {
          numeric: true,
          sensitivity: "base"
        });
      });

      facilitiesData.forEach(function(facility) {
        const option = document.createElement("option");
        option.value = facility.facilityId || facility.id;
        option.innerText = getFacilityName(facility);
        select.appendChild(option);
      });

      if (facilitiesData.length === 1) {
        select.value = facilitiesData[0].facilityId || facilitiesData[0].id;
      }

      if (facilitiesData.length === 0) {
        addFallbackFacilityOption();
      }
    } catch (error) {
      console.error("Facility load error:", error);
      addFallbackFacilityOption();
      showMessage("Using starter facility option", true);
    }
  }

  function addFallbackFacilityOption() {
    facilitiesData = [{
      id: "gms",
      facilityId: "gms",
      facilityName: "GMS / Grace Manor Suites",
      active: true
    }];

    const select = document.getElementById("facilitySelect");
    select.innerHTML = "";
    const option = document.createElement("option");
    option.value = "gms";
    option.innerText = "GMS / Grace Manor Suites";
    select.appendChild(option);
  }


  /* =========================
     07 - LOGIN
  ========================== */

  async function checkPin() {
    if (loginInProgress) return;

    const facilityId = document.getElementById("facilitySelect").value.trim();
    const pinInput = document.getElementById("pin").value.trim();

    if (!facilityId) {
      showMessage("Choose facility", false);
      return;
    }

    if (!pinInput) {
      showMessage("Enter PIN", false);
      return;
    }

    if (pinInput.length !== 4) {
      showMessage("Enter 4 digits", false);
      return;
    }

    loginInProgress = true;
    setLoginButtonDisabled(true);
    showMessage("Checking...", true);

    try {
      const currentFacility = getSelectedFacility(facilityId);

      let employeeResult = await findEmployeeInFacility(facilityId, pinInput);

      if (!employeeResult) {
        employeeResult = await findEmployeeInRootCollection(facilityId, pinInput);
      }

      if (!employeeResult) {
        loginInProgress = false;
        setLoginButtonDisabled(false);
        showMessage("Invalid PIN", false);
        return;
      }

      const currentEmployee = buildEmployeeSession(
        employeeResult.docId,
        employeeResult.data,
        pinInput,
        facilityId
      );

      if (!isEmployeeActive(currentEmployee)) {
        loginInProgress = false;
        setLoginButtonDisabled(false);
        showMessage("Inactive employee", false);
        return;
      }

      sessionStorage.setItem("currentFacility", JSON.stringify(currentFacility));
      sessionStorage.setItem("currentEmployee", JSON.stringify(currentEmployee));

      showMessage("Login successful", true);

      setTimeout(function() {
        if (isAdminSessionUser(currentEmployee)) {
          window.location.href = ADMIN_PAGE_URL;
          return;
        }

        window.location.href = EMPLOYEE_PAGE_URL;
      }, 450);

    } catch (error) {
      loginInProgress = false;
      setLoginButtonDisabled(false);
      console.error("Login error:", error);
      showMessage("Connection error", false);
    }
  }

  async function findEmployeeInFacility(facilityId, pinInput) {
    const employeeQuery = query(
      collection(db, "facilities", facilityId, "employees"),
      where("pin", "==", pinInput),
      limit(1)
    );

    const snap = await getDocs(employeeQuery);

    if (snap.empty) return null;

    const docSnap = snap.docs[0];

    return {
      docId: docSnap.id,
      data: docSnap.data()
    };
  }

  async function findEmployeeInRootCollection(facilityId, pinInput) {
    const employeeQuery = query(
      collection(db, "employees"),
      where("pin", "==", pinInput),
      limit(1)
    );

    const snap = await getDocs(employeeQuery);

    if (snap.empty) return null;

    const docSnap = snap.docs[0];
    const employee = docSnap.data();
    const employeeFacilityId = cleanText(employee.facilityId || employee.facility || "gms");

    if (employeeFacilityId && employeeFacilityId !== facilityId) {
      return null;
    }

    return {
      docId: docSnap.id,
      data: employee
    };
  }


  /* =========================
     08 - SESSION BUILDERS
  ========================== */

  function getSelectedFacility(facilityId) {
    const facility = facilitiesData.find(function(item) {
      return String(item.facilityId || item.id || "") === String(facilityId || "");
    }) || {
      id: facilityId,
      facilityId: facilityId,
      facilityName: facilityId
    };

    return {
      id: cleanText(facility.id || facilityId),
      facilityId: cleanText(facility.facilityId || facility.id || facilityId),
      facilityName: cleanText(facility.facilityName || facility.name || facilityId),
      facilityType: cleanText(facility.facilityType || ""),
      city: cleanText(facility.city || ""),
      state: cleanText(facility.state || "")
    };
  }

  function buildEmployeeSession(docId, emp, pinInput, facilityId) {
    const firstName = cleanText(emp.firstName || "Employee");
    const lastName = cleanText(emp.lastName || "");
    const employeeName = cleanText(emp.employeeName || emp.name || `${firstName} ${lastName}`);
    const role = cleanText(emp.role || emp.employeeRole || "employee").toLowerCase();
    const assignment = cleanText(emp.assignment || "Employee");
    const defaultSchedule = cleanText(emp.defaultSchedule || "");
    const permissions = buildPermissions(emp);

    return {
      id: docId,
      employeeId: cleanText(emp.employeeId || docId),
      facilityId: facilityId,
      firstName: firstName,
      lastName: lastName,
      employeeName: employeeName,
      name: employeeName,
      pin: pinInput,
      role: role,
      assignment: assignment,
      defaultSchedule: defaultSchedule,
      active: emp.active,
      permissions: permissions
    };
  }

  function buildPermissions(emp) {
    const permissions = emp.permissions || {};

    return {
      adminDashboard: readPermission(permissions.adminDashboard, emp.canViewAdminDashboard),
      employeeDoor: readPermission(permissions.employeeDoor, emp.canViewEmployeeDoor),
      roomSections: readPermission(permissions.roomSections, emp.canViewRooms),
      commonAreaSections: readPermission(permissions.commonAreaSections, emp.canViewCommonAreas),
      operationsDoor: readPermission(permissions.operationsDoor, emp.canViewOperations),
      editEmployees: readPermission(permissions.editEmployees, emp.canEditEmployees),
      editFacility: readPermission(permissions.editFacility, emp.canEditFacility),
      editDoorButtons: readPermission(permissions.editDoorButtons, emp.canEditDoorButtons)
    };
  }


  /* =========================
     09 - HELPERS
  ========================== */

  function isEmployeeActive(emp) {
    const active = emp.active;

    if (active === false) return false;

    const activeText = cleanText(active).toLowerCase();

    if (activeText === "no") return false;
    if (activeText === "false") return false;
    if (activeText === "inactive") return false;

    return true;
  }

  function isAdminSessionUser(user) {
    if (!user) return false;

    const roleText = cleanText(user.role).toLowerCase();
    const assignmentText = cleanText(user.assignment).toLowerCase();
    const permissions = user.permissions || {};

    if (roleText === "admin") return true;
    if (assignmentText === "admin") return true;
    if (permissions.adminDashboard === true) return true;
    if (permissions.operationsDoor === true) return true;

    return false;
  }

  function readPermission(permissionValue, fallbackValue) {
    if (permissionValue === true || fallbackValue === true) return true;

    const permissionText = cleanText(permissionValue).toLowerCase();
    const fallbackText = cleanText(fallbackValue).toLowerCase();

    return permissionText === "yes" ||
      permissionText === "true" ||
      permissionText === "1" ||
      fallbackText === "yes" ||
      fallbackText === "true" ||
      fallbackText === "1";
  }

  function handlePinInput(input) {
    input.value = String(input.value || "")
      .replace(/\D/g, "")
      .slice(0, 4);

    if (input.value.length === 4) {
      checkPin();
    }
  }

  function showMessage(text, success) {
    const message = document.getElementById("message");

    message.style.display = "block";
    message.classList.remove("success-message", "error-message");
    message.classList.add(success ? "success-message" : "error-message");
    message.innerText = text;
  }

  function setLoginButtonDisabled(disabled) {
    const button = document.getElementById("loginButton");
    button.disabled = disabled;
    button.innerText = disabled ? "CHECKING..." : "ENTER";
  }

  function getFacilityName(facility) {
    return cleanText(facility.facilityName || facility.name || facility.facilityId || facility.id || "Facility");
  }

  function cleanText(value) {
    if (value === null || value === undefined) return "";

    return String(value)
      .replace(/\u00A0/g, " ")
      .replace(/\s+/g, " ")
      .trim();
  }

  document.getElementById("pin").addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
      checkPin();
    }
  });

  window.checkPin = checkPin;
  window.handlePinInput = handlePinInput;

</script>

</body>
</html>
