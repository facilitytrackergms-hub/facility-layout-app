<!DOCTYPE html>
<html lang="en">
<head>
  <!-- =========================
       01 - HEAD
  ========================== -->

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Facility Information GMS</title>

  <style>
    /* =========================
       02 - GLOBAL STYLE
    ========================== */

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      min-height: 100vh;
      padding: 10px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .app {
      width: 100%;
      max-width: 430px;
      background: #ffffff;
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.18);
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .title {
      font-size: 22px;
      font-weight: 900;
      margin: 0;
      line-height: 1.1;
    }

    .tag {
      font-size: 12px;
      font-weight: 700;
      color: #555;
      margin-top: 4px;
    }

    .back-btn {
      border: none;
      background: #222;
      color: white;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
      white-space: nowrap;
    }

    .info-card {
      border: 2px dashed #d2d2d2;
      border-radius: 16px;
      background: #fafafa;
      padding: 12px;
    }

    .info-row {
      background: white;
      border: 1px solid #e2e2e2;
      border-radius: 12px;
      padding: 10px;
      margin-bottom: 8px;
    }

    .info-row:last-child {
      margin-bottom: 0;
    }

    .label {
      font-size: 11px;
      font-weight: 900;
      color: #555;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .value {
      font-size: 16px;
      font-weight: 800;
      color: #111;
      word-break: break-word;
    }

    .status {
      margin-top: 10px;
      padding: 10px;
      border-radius: 12px;
      background: #eeeeee;
      font-size: 13px;
      font-weight: 800;
      text-align: center;
      color: #333;
    }

    .version {
      margin-top: 14px;
      text-align: center;
      font-size: 11px;
      color: #777;
    }

    .back-btn:active {
      transform: scale(0.98);
    }
  </style>
</head>

<body>
  <!-- =========================
       03 - APP SHELL
  ========================== -->

  <main class="app">
    <div class="top-row">
      <div>
        <h1 class="title">Facility Information</h1>
        <div id="facilityTag" class="tag">Loading facility...</div>
      </div>

      <button class="back-btn" onclick="goBack()">Back</button>
    </div>

    <section id="facilityInfoCard" class="info-card">
      <div class="status">Loading facility information...</div>
    </section>

    <div id="statusBox" class="status">Connecting to Facility_Info tab...</div>

    <div class="version">
      Updated: 2026-05-23 11:05 AM • GMS/facilityinformationGMS.html
    </div>
  </main>

  <script>
    /* =========================
       04 - SETTINGS
    ========================== */

    const FACILITY_INFO_CSV_URL = "https://docs.google.com/spreadsheets/d/1NgaIHQopiTuTuJpKgO05gxDddRaMwg_7HusVDarcfq0/export?format=csv&gid=1935549420";

    let selectedFacilityId = "";
    let selectedFacilityName = "";
    let facilityRows = [];

    /* =========================
       05 - STARTUP
    ========================== */

    document.addEventListener("DOMContentLoaded", async () => {
      readFacilityFromUrl();
      await loadFacilityInformation();
    });

    /* =========================
       06 - READ SELECTED FACILITY
    ========================== */

    function readFacilityFromUrl() {
      const params = new URLSearchParams(window.location.search);

      selectedFacilityId = params.get("facilityId") || params.get("id") || "F_001";
      selectedFacilityName = params.get("facilityName") || params.get("name") || "";

      document.getElementById("facilityTag").innerText =
        selectedFacilityName || selectedFacilityId || "Facility selected";
    }

    /* =========================
       07 - LOAD SHEET DATA
    ========================== */

    async function loadFacilityInformation() {
      const card = document.getElementById("facilityInfoCard");
      const statusBox = document.getElementById("statusBox");

      try {
        const response = await fetch(FACILITY_INFO_CSV_URL);

        if (!response.ok) {
          throw new Error("Sheet response failed");
        }

        const csvText = await response.text();

        facilityRows = parseCsv(csvText);

        const facility = findSelectedFacility();

        if (!facility) {
          card.innerHTML = '<div class="status">No matching facility found.</div>';
          statusBox.innerText = "Check facilityId or facilityName.";
          return;
        }

        renderFacilityInfo(facility);
        statusBox.innerText = "Facility information loaded.";
      } catch (error) {
        console.error(error);
        card.innerHTML = '<div class="status">Could not load facility information.</div>';
        statusBox.innerText = "If this does not load, publish the Facility_Info tab to web as CSV or make the sheet link viewable.";
      }
    }

    /* =========================
       08 - FIND FACILITY
    ========================== */

    function findSelectedFacility() {
      if (!facilityRows.length) return null;

      return facilityRows.find(row => {
        const rowFacilityId = String(row.facilityId || "").trim();
        const rowFacilityName = String(row.facilityName || "").trim();

        if (selectedFacilityId && rowFacilityId.toLowerCase() === selectedFacilityId.toLowerCase()) {
          return true;
        }

        if (selectedFacilityName && rowFacilityName.toLowerCase() === selectedFacilityName.toLowerCase()) {
          return true;
        }

        return false;
      }) || facilityRows[0];
    }

    /* =========================
       09 - RENDER FACILITY INFO
    ========================== */

    function renderFacilityInfo(facility) {
      const card = document.getElementById("facilityInfoCard");

      const fields = [
        { key: "facilityId", label: "Facility ID" },
        { key: "facilityName", label: "Facility Name" },
        { key: "facilityType", label: "Facility Type" },
        { key: "address", label: "Address" },
        { key: "city", label: "City" },
        { key: "state", label: "State" },
        { key: "zip", label: "Zip" },
        { key: "mainPhone", label: "Main Phone" },
        { key: "mainEmail", label: "Main Email" },
        { key: "managerName", label: "Manager Name" },
        { key: "managerPhone", label: "Manager Phone" },
        { key: "managerEmail", label: "Manager Email" },
        { key: "maintenanceContact", label: "Maintenance Contact" },
        { key: "maintenancePhone", label: "Maintenance Phone" },
        { key: "emergencyContact", label: "Emergency Contact" },
        { key: "emergencyPhone", label: "Emergency Phone" },
        { key: "notes", label: "Notes" },
        { key: "lastUpdated", label: "Last Updated" }
      ];

      const html = fields
        .filter(field => String(facility[field.key] || "").trim() !== "")
        .map(field => {
          return `
            <div class="info-row">
              <div class="label">${escapeHtml(field.label)}</div>
              <div class="value">${escapeHtml(formatValue(facility[field.key]))}</div>
            </div>
          `;
        })
        .join("");

      card.innerHTML = html || '<div class="status">No facility information entered yet.</div>';
    }

    /* =========================
       10 - CSV PARSER
    ========================== */

    function parseCsv(csvText) {
      const cleanText = String(csvText || "").trim();

      if (!cleanText) return [];

      const lines = cleanText.split(/\r?\n/);

      if (lines.length < 2) return [];

      const headers = splitCsvLine(lines[0]).map(header => header.trim()).filter(Boolean);
      const rows = [];

      for (let i = 1; i < lines.length; i++) {
        const values = splitCsvLine(lines[i]);
        const row = {};

        headers.forEach((header, index) => {
          row[header] = values[index] ? values[index].trim() : "";
        });

        rows.push(row);
      }

      return rows;
    }

    function splitCsvLine(line) {
      const result = [];
      let current = "";
      let insideQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const nextChar = line[i + 1];

        if (char === '"' && insideQuotes && nextChar === '"') {
          current += '"';
          i++;
        } else if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === "," && !insideQuotes) {
          result.push(current);
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current);
      return result;
    }

    /* =========================
       11 - HELPERS
    ========================== */

    function goBack() {
      window.history.back();
    }

    function formatValue(value) {
      if (value === null || value === undefined) return "";

      const text = String(value).trim();

      if (text.endsWith(".0") && !isNaN(Number(text))) {
        return text.replace(".0", "");
      }

      return text;
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
