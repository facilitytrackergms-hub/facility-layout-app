<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facility Dashboard</title>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; }
  h1 { text-align: center; }
  .tool-buttons { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 20px; }
  .tool-buttons button { padding: 15px 25px; border-radius: 8px; border: none; background-color: #ffc107; cursor: pointer; font-weight: bold; }
  #toolContainer { margin-top: 30px; }
</style>
</head>
<body>

<h1 id="facilityName"></h1>

<div class="tool-buttons">
    <button onclick="loadTool('ED_Info.html')">E.D Info</button>
    <button onclick="loadTool('Maintenances_Info.html')">Maintenance Info</button>
    <!-- Add more tool buttons as needed -->
</div>

<div id="toolContainer"></div>

<script>
// Read the facility ID from the URL
const params = new URLSearchParams(window.location.search);
const facilityId = params.get('facility');
document.getElementById('facilityName').textContent = facilityId ? `Facility Dashboard: ${facilityId}` : 'Facility Dashboard';

// Load the selected tool into the container (iframe or AJAX)
function loadTool(page) {
    const container = document.getElementById('toolContainer');
    container.innerHTML = `<iframe src="${page}" style="width:100%; height:500px; border:none;"></iframe>`;
}
</script>

</body>
</html>
