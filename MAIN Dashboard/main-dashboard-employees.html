<!DOCTYPE html>
<html lang="en">
<head>
  <!-- =========================
       01 - HEAD
  ========================== -->

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Main Dashboard Employees</title>

  <style>
    /* =========================
       02 - GLOBAL STYLE
    ========================== */

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      min-height: 100vh;
      padding: 10px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .app {
      width: 100%;
      max-width: 430px;
      background: #ffffff;
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.18);
    }

    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .title {
      font-size: 21px;
      font-weight: 900;
      margin: 0;
      line-height: 1.1;
    }

    .tag {
      font-size: 12px;
      font-weight: 700;
      color: #555;
      margin-top: 4px;
    }

    .back-btn {
      border: none;
      background: #222;
      color: white;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
      white-space: nowrap;
    }

    .card-box {
      border: 2px dashed #d2d2d2;
      border-radius: 16px;
      background: #fafafa;
      padding: 12px;
      margin-bottom: 12px;
    }

    .box-title {
      font-size: 16px;
      font-weight: 900;
      text-align: center;
      margin-bottom: 10px;
      color: #111;
    }

    .input,
    .select,
    .textarea {
      width: 100%;
      border: 1px solid #bbb;
      border-radius: 12px;
      padding: 11px;
      font-size: 15px;
      font-weight: 700;
      outline: none;
      margin-bottom: 8px;
      background: white;
    }

    .textarea {
      min-height: 70px;
      resize: vertical;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .main-btn {
      width: 100%;
      border: none;
      background: #222;
      color: #ffffff;
      border-radius: 12px;
      padding: 12px;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      margin-top: 4px;
    }

    .yellow-btn {
      background: #f4c542;
      color: #111;
    }

    .danger-btn {
      background: #b91c1c;
      color: #ffffff;
    }

    .views-btn {
      width: 100%;
      border: none;
      background: #f4c542;
      color: #111;
      border-radius: 12px;
      padding: 12px;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      margin-bottom: 8px;
    }

    .rights-grid {
      display: none;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 8px;
    }

    .rights-grid.active {
      display: grid;
    }

    .check-row {
      background: #ffffff;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 9px;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 800;
    }

    .check-row input {
      width: 18px;
      height: 18px;
    }

    .employee-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .employee-card {
      border: 1px solid #ddd;
      border-radius: 14px;
      background: white;
      padding: 10px;
    }

    .employee-name {
      font-size: 16px;
      font-weight: 900;
      color: #111;
    }

    .employee-meta {
      font-size: 12px;
      font-weight: 700;
      color: #555;
      margin-top: 3px;
      line-height: 1.4;
    }

    .employee-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    .small-btn {
      border: none;
      border-radius: 10px;
      padding: 9px;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
      background: #eee;
    }

    .status {
      display: none;
      margin-top: 8px;
      padding: 10px;
      border-radius: 12px;
      background: #eeeeee;
      font-size: 13px;
      font-weight: 800;
      text-align: center;
      color: #333;
    }

    .status.active {
      display: block;
    }

    .version {
      margin-top: 14px;
      text-align: center;
      font-size: 11px;
      color: #777;
    }

    .back-btn:active,
    .main-btn:active,
    .small-btn:active,
    .views-btn:active {
      transform: scale(0.98);
    }
  </style>
</head>

<body>
  <!-- =========================
       03 - APP SHELL
  ========================== -->

  <main class="app">
    <div class="top-row">
      <div>
        <h1 class="title">Employees</h1>
        <div class="tag">Main Dashboard Access</div>
      </div>

      <button class="back-btn" onclick="goBack()">Back</button>
    </div>

    <section class="card-box">
      <div class="box-title">Add / Edit Employee</div>

      <input
        id="employeeName"
        name="newEmployeeNameField"
        class="input"
        type="text"
        placeholder="Enter new employee name"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        value=""
      >

      <div class="two-col">
        <input
          id="loginPin"
          name="newEmployeePinField"
          class="input"
          type="password"
          placeholder="Enter PIN"
          autocomplete="new-password"
          inputmode="numeric"
          maxlength="4"
          pattern="[0-9]*"
          value=""
          oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 4);"
        >

        <select id="role" class="select">
          <option value="Admin">Admin</option>
          <option value="Manager">Manager</option>
          <option value="Employee">Employee</option>
        </select>
      </div>

      <select id="allowedFacilities" class="select">
        <option value="ALL">ALL Facilities</option>
      </select>

      <select id="defaultFacility" class="select">
        <option value="">Default facility</option>
      </select>

      <button class="views-btn" onclick="toggleViews()" type="button">
        Allowed Views
      </button>

      <div id="rightsGrid" class="rights-grid">
        <label class="check-row"><input id="adminAccess" type="checkbox"> Admin</label>
        <label class="check-row"><input id="viewMainDashboard" type="checkbox" checked> Main</label>
        <label class="check-row"><input id="viewFacilityDashboard" type="checkbox" checked> Facility</label>
        <label class="check-row"><input id="viewFacilityInfo" type="checkbox" checked> Info</label>
        <label class="check-row"><input id="viewEmployees" type="checkbox"> Employees</label>
        <label class="check-row"><input id="viewSettings" type="checkbox"> Settings</label>
        <label class="check-row"><input id="viewReports" type="checkbox"> Reports</label>
        <label class="check-row"><input id="viewTools" type="checkbox"> Tools</label>
        <label class="check-row"><input id="active" type="checkbox" checked> Active</label>
      </div>

      <textarea id="notes" class="textarea" placeholder="Notes"></textarea>

      <button class="main-btn yellow-btn" onclick="saveEmployee()">Save Employee</button>
      <button class="main-btn" onclick="clearForm()">Clear Form</button>

      <div id="statusBox" class="status"></div>
    </section>

    <section class="card-box">
      <div class="box-title">Saved Employees</div>
      <div id="employeeList" class="employee-list">
        <div class="employee-meta">No employees added yet.</div>
      </div>
    </section>

    <div class="version">
      Updated: 2026-05-23 01:15 PM • MAIN Dashboard/main-dashboard-employees.html
    </div>
  </main>

  <script>
    /* =========================
       04 - SETTINGS
    ========================== */

    const SHEET_ID = "1NgaIHQopiTuTuJpKgO05gxDddRaMwg_7HusVDarcfq0";

    const FACILITY_INFO_CSV_URL =
      "https://docs.google.com/spreadsheets/d/" + SHEET_ID + "/gviz/tq?tqx=out:csv&sheet=Facility_Info";

    const STORAGE_KEY = "facilityLayoutEmployeesV5";

    let employees = [];
    let facilities = [];
    let editingIndex = null;

    /* =========================
       05 - STARTUP
    ========================== */

    document.addEventListener("DOMContentLoaded", async () => {
      clearVisibleInputsOnLoad();
      await loadFacilitiesFromSheet();
      loadEmployees();
      renderFacilityDropdowns();
      renderEmployees();
      clearVisibleInputsOnLoad();
    });

    function clearVisibleInputsOnLoad() {
      const employeeName = document.getElementById("employeeName");
      const loginPin = document.getElementById("loginPin");

      if (employeeName) {
        employeeName.value = "";
        employeeName.placeholder = "Enter new employee name";
      }

      if (loginPin) {
        loginPin.value = "";
        loginPin.placeholder = "Enter PIN";
      }
    }

    /* =========================
       06 - LOAD FACILITIES
    ========================== */

    async function loadFacilitiesFromSheet() {
      try {
        const response = await fetch(FACILITY_INFO_CSV_URL);
        const csvText = await response.text();

        facilities = parseCsv(csvText)
          .filter(row => normalize(row.facilityId) && normalize(row.facilityName))
          .map(row => {
            return {
              id: normalize(row.facilityId),
              name: normalize(row.facilityName),
              initials: makeInitials(row.facilityName)
            };
          });
      } catch (error) {
        console.error(error);
        facilities = [];
        showStatus("Could not load current facilities.");
      }
    }

    function renderFacilityDropdowns() {
      const allowedSelect = document.getElementById("allowedFacilities");
      const defaultSelect = document.getElementById("defaultFacility");

      const facilityOptions = facilities.map(facility => {
        return `
          <option value="${escapeHtml(facility.initials)}">
            ${escapeHtml(facility.initials)} - ${escapeHtml(facility.name)}
          </option>
        `;
      }).join("");

      allowedSelect.innerHTML =
        '<option value="ALL">ALL Facilities</option>' +
        facilityOptions;

      defaultSelect.innerHTML =
        '<option value="">Default facility</option>' +
        facilityOptions;
    }

    /* =========================
       07 - LOAD AND SAVE EMPLOYEES
    ========================== */

    function loadEmployees() {
      const saved = localStorage.getItem(STORAGE_KEY);

      if (!saved) {
        employees = [];
        return;
      }

      try {
        employees = JSON.parse(saved);
      } catch (error) {
        employees = [];
      }
    }

    function saveEmployeesToStorage() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(employees));
    }

    /* =========================
       08 - SAVE EMPLOYEE
    ========================== */

    function saveEmployee() {
      const employee = getEmployeeFromForm();

      if (!employee.employeeName) {
        showStatus("Enter employee name.");
        return;
      }

      if (!employee.loginPin) {
        showStatus("Enter PIN.");
        return;
      }

      if (!employee.employeeId) {
        employee.employeeId = makeEmployeeId(employee.employeeName);
      }

      const duplicatePin = employees.some((item, index) => {
        return index !== editingIndex && normalizePin(item.loginPin) === normalizePin(employee.loginPin);
      });

      if (duplicatePin) {
        showStatus("That PIN is already used.");
        return;
      }

      if (editingIndex === null) {
        employees.push(employee);
        showStatus("Employee saved.");
      } else {
        employees[editingIndex] = employee;
        showStatus("Employee updated.");
      }

      saveEmployeesToStorage();
      renderEmployees();
      clearForm();
    }

    function getEmployeeFromForm() {
      return {
        employeeId: editingIndex === null ? "" : employees[editingIndex].employeeId,
        employeeName: getValue("employeeName"),
        loginPin: getValue("loginPin"),
        role: getValue("role"),
        adminAccess: getCheckedValue("adminAccess"),
        viewMainDashboard: getCheckedValue("viewMainDashboard"),
        viewFacilityDashboard: getCheckedValue("viewFacilityDashboard"),
        viewFacilityInfo: getCheckedValue("viewFacilityInfo"),
        viewEmployees: getCheckedValue("viewEmployees"),
        viewSettings: getCheckedValue("viewSettings"),
        viewReports: getCheckedValue("viewReports"),
        viewTools: getCheckedValue("viewTools"),
        allowedFacilities: getValue("allowedFacilities") || "ALL",
        defaultFacility: getValue("defaultFacility"),
        active: getCheckedValue("active"),
        notes: getValue("notes"),
        lastUpdated: new Date().toLocaleString()
      };
    }

    function makeEmployeeId(name) {
      const initials = String(name || "")
        .replace(/[^a-zA-Z0-9 ]/g, " ")
        .split(" ")
        .filter(Boolean)
        .map(word => word[0])
        .join("")
        .substring(0, 4)
        .toUpperCase();

      const number = String(employees.length + 1).padStart(3, "0");
      return (initials || "EMP") + "_" + number;
    }

    /* =========================
       09 - RENDER EMPLOYEES
    ========================== */

    function renderEmployees() {
      const list = document.getElementById("employeeList");

      if (!employees.length) {
        list.innerHTML = '<div class="employee-meta">No employees added yet.</div>';
        return;
      }

      list.innerHTML = employees.map((employee, index) => {
        return `
          <div class="employee-card">
            <div class="employee-name">${escapeHtml(employee.employeeName)}</div>
            <div class="employee-meta">
              Role: ${escapeHtml(employee.role)} • Active: ${escapeHtml(employee.active)}<br>
              Facilities: ${escapeHtml(employee.allowedFacilities || "")}<br>
              Default: ${escapeHtml(employee.defaultFacility || "")}<br>
              PIN: ****
            </div>

            <div class="employee-actions">
              <button class="small-btn" onclick="editEmployee(${index})">Edit</button>
              <button class="small-btn danger-btn" onclick="deleteEmployee(${index})">Delete</button>
            </div>
          </div>
        `;
      }).join("");
    }

    /* =========================
       10 - EDIT AND DELETE
    ========================== */

    function editEmployee(index) {
      const employee = employees[index];

      if (!employee) return;

      editingIndex = index;

      setValue("employeeName", employee.employeeName);
      setValue("loginPin", employee.loginPin);
      setValue("role", employee.role);
      setValue("allowedFacilities", employee.allowedFacilities || "ALL");
      setValue("defaultFacility", employee.defaultFacility);
      setValue("notes", employee.notes);

      setCheckedFromValue("adminAccess", employee.adminAccess);
      setCheckedFromValue("viewMainDashboard", employee.viewMainDashboard);
      setCheckedFromValue("viewFacilityDashboard", employee.viewFacilityDashboard);
      setCheckedFromValue("viewFacilityInfo", employee.viewFacilityInfo);
      setCheckedFromValue("viewEmployees", employee.viewEmployees);
      setCheckedFromValue("viewSettings", employee.viewSettings);
      setCheckedFromValue("viewReports", employee.viewReports);
      setCheckedFromValue("viewTools", employee.viewTools);
      setCheckedFromValue("active", employee.active);

      showStatus("Editing employee.");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function deleteEmployee(index) {
      employees.splice(index, 1);
      saveEmployeesToStorage();
      renderEmployees();
      clearForm();
      showStatus("Employee deleted.");
    }

    function clearForm() {
      editingIndex = null;

      setValue("employeeName", "");
      setValue("loginPin", "");
      setValue("role", "Admin");
      setValue("allowedFacilities", "ALL");
      setValue("defaultFacility", "");
      setValue("notes", "");

      document.getElementById("adminAccess").checked = false;
      document.getElementById("viewMainDashboard").checked = true;
      document.getElementById("viewFacilityDashboard").checked = true;
      document.getElementById("viewFacilityInfo").checked = true;
      document.getElementById("viewEmployees").checked = false;
      document.getElementById("viewSettings").checked = false;
      document.getElementById("viewReports").checked = false;
      document.getElementById("viewTools").checked = false;
      document.getElementById("active").checked = true;

      document.getElementById("rightsGrid").classList.remove("active");
    }

    /* =========================
       11 - VIEW TOGGLE
    ========================== */

    function toggleViews() {
      document.getElementById("rightsGrid").classList.toggle("active");
    }

    /* =========================
       12 - CSV PARSER
    ========================== */

    function parseCsv(csvText) {
      const cleanText = String(csvText || "").trim();

      if (!cleanText) return [];

      const lines = cleanText.split(/\r?\n/);

      if (lines.length < 2) return [];

      const headers = splitCsvLine(lines[0]).map(header => header.trim()).filter(Boolean);
      const rows = [];

      for (let i = 1; i < lines.length; i++) {
        const values = splitCsvLine(lines[i]);
        const row = {};

        headers.forEach((header, index) => {
          row[header] = values[index] ? values[index].trim() : "";
        });

        rows.push(row);
      }

      return rows;
    }

    function splitCsvLine(line) {
      const result = [];
      let current = "";
      let insideQuotes = false;

      for (let i = 0; i < line.length; i++) {
        const char = line[i];
        const nextChar = line[i + 1];

        if (char === '"' && insideQuotes && nextChar === '"') {
          current += '"';
          i++;
        } else if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === "," && !insideQuotes) {
          result.push(current);
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current);
      return result;
    }

    /* =========================
       13 - HELPERS
    ========================== */

    function getValue(id) {
      return document.getElementById(id).value.trim();
    }

    function setValue(id, value) {
      document.getElementById(id).value = value || "";
    }

    function getCheckedValue(id) {
      return document.getElementById(id).checked ? "yes" : "no";
    }

    function setCheckedFromValue(id, value) {
      document.getElementById(id).checked = String(value || "").toLowerCase() === "yes";
    }

    function showStatus(message) {
      const statusBox = document.getElementById("statusBox");
      statusBox.innerText = message;
      statusBox.classList.add("active");

      setTimeout(() => {
        statusBox.classList.remove("active");
      }, 2500);
    }

    function makeInitials(name) {
      const cleanName = String(name || "").trim();

      if (!cleanName) return "NEW";

      if (cleanName.includes("/")) {
        const beforeSlash = cleanName.split("/")[0].trim();
        const cleaned = beforeSlash.replace(/[^a-zA-Z0-9]/g, "");
        return cleaned.substring(0, 4).toUpperCase() || "NEW";
      }

      const words = cleanName
        .replace(/[^a-zA-Z0-9 ]/g, " ")
        .split(" ")
        .filter(Boolean);

      if (!words.length) return "NEW";

      if (words.length === 1) {
        return words[0].substring(0, 4).toUpperCase();
      }

      return words
        .map(word => word[0])
        .join("")
        .substring(0, 4)
        .toUpperCase();
    }

    function normalize(value) {
      return String(value || "").trim();
    }

    function normalizePin(value) {
      return String(value || "")
        .replace(/\.0$/, "")
        .replace(/[^0-9]/g, "");
    }

    function goBack() {
      window.history.back();
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
