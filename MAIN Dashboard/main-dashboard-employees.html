<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employees - Main Dashboard Access</title>
<style>
body {margin:0;font-family:Arial,sans-serif;background:#f2f2f2;display:flex;justify-content:center;padding:10px;}
.card {width:100%;max-width:460px;background:white;border-radius:12px;padding:12px;margin-bottom:12px;box-shadow:0 3px 10px rgba(0,0,0,0.15);}
h2 {margin-top:0;font-size:16px;text-align:center;}
.form-group {margin-bottom:10px;}
.form-group label {display:block;font-size:12px;margin-bottom:2px;font-weight:bold;}
.form-group input,.form-group select,.form-group textarea {width:100%;padding:6px;font-size:12px;border-radius:6px;border:1px solid #ccc;}
button {width:100%;padding:12px;margin-top:10px;font-size:14px;border:none;border-radius:6px;cursor:pointer;}
.btn-black {background:#000;color:#fff;}
.btn-yellow {background:#ffbf00;color:#000;}
.version-label {font-size:10px;text-align:center;margin-top:6px;color:#777;}
.employee-details {display:none;margin-top:10px;}
</style>
</head>
<body>
<div class="card">
<h2>Employees<br><small>Main Dashboard Access</small></h2>

<div class="form-group">
<label for="pin">Enter Admin PIN</label>
<input type="password" id="pin" value="">
</div>

<button class="btn-yellow" id="manageEmployeesBtn">Manage Employees</button>

<div class="employee-details" id="employeeDetails">
<div class="form-group">
<label for="editEmployeeName">Employee Name</label>
<input type="text" id="editEmployeeName" value="Ivy Edward">
</div>

<div class="form-group">
<label for="editPin">PIN</label>
<input type="password" id="editPin" value="">
</div>

<div class="form-group">
<label for="editRole">Role</label>
<select id="editRole">
<option value="" selected></option>
<option>Admin</option>
<option>Employee</option>
<option>Housekeeper</option>
<option>Laundry</option>
</select>
</div>

<div class="form-group">
<label for="editFacilityAccess">Facility Access</label>
<select id="editFacilityAccess">
<option value="" selected></option>
<option>All Facilities</option>
<option>Facility 1</option>
<option>Facility 2</option>
</select>
</div>

<div class="form-group">
<label for="editNotes">Notes</label>
<textarea id="editNotes" rows="2"></textarea>
</div>

<button class="btn-yellow" id="saveEditBtn">Save Changes</button>
</div>

<div class="version-label">
Updated: 2026-05-23 09:10 AM • employees.html
</div>
</div>

<script>
const manageBtn = document.getElementById('manageEmployeesBtn');
const pinInput = document.getElementById('pin');
const employeeDetails = document.getElementById('employeeDetails');
const saveBtn = document.getElementById('saveEditBtn');

async function validateAdminPin(pin) {
  try {
    const res = await fetch(`${API_URL}?sheet=Employees`);
    const data = await res.json();
    return data.find(emp => String(emp.loginPin || "") === pin && emp.role.toLowerCase() === "admin");
  } catch(e) {
    console.error(e);
    return null;
  }
}

manageBtn.addEventListener('click', async () => {
  const pin = pinInput.value.trim();
  if(!pin) { alert("Enter PIN"); return; }

  const admin = await validateAdminPin(pin);
  if(!admin) { alert("Invalid admin PIN"); return; }

  employeeDetails.style.display = 'block';
  document.getElementById('editEmployeeName').value = "Ivy Edward";
  document.getElementById('editPin').value = "";
  document.getElementById('editRole').value = "";
  document.getElementById('editFacilityAccess').value = "";
  document.getElementById('editNotes').value = "";
});

saveBtn.addEventListener('click', async () => {
  const payload = {
    sheet: "Employees",
    data: {
      employeeName: document.getElementById('editEmployeeName').value,
      loginPin: document.getElementById('editPin').value,
      role: document.getElementById('editRole').value,
      allowedFacilities: document.getElementById('editFacilityAccess').value,
      notes: document.getElementById('editNotes').value
    }
  };

  try {
    await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });
    alert("Employee details saved!");
  } catch(e) {
    console.error(e);
    alert("Failed to save employee data.");
  }
});
</script>
</body>
</html>
