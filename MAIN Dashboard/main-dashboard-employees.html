<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employee Management</title>
<style>
  body { margin:0; font-family:Arial,sans-serif; background:#f2f2f2; display:flex; justify-content:center; padding:10px; }
  .card { width:100%; max-width:460px; background:white; border-radius:12px; padding:20px; box-shadow:0 3px 10px rgba(0,0,0,0.15); }
  .form-group { margin-bottom:10px; }
  .form-group label { display:block; font-size:12px; font-weight:bold; margin-bottom:2px; }
  .form-group input, .form-group select, .form-group textarea { width:100%; padding:8px; border-radius:6px; border:1px solid #ccc; box-sizing: border-box; }
  button { width:100%; padding:14px; margin-top:10px; border:none; border-radius:8px; cursor:pointer; font-weight:bold; }
  .btn-black { background:#000; color:#fff; }
  .btn-yellow { background:#ffbf00; color:#000; }
</style>
</head>
<body>
<div class="card">
  <h2 style="text-align:center">Manage Employee</h2>
  <button class="btn-black" onclick="window.history.back()">Back</button>
  <hr>
  <div class="form-group">
    <label>Employee Name</label>
    <input type="text" id="employeeName">
  </div>
  <div class="form-group">
    <label>PIN</label>
    <input type="text" id="pin">
  </div>
  <div class="form-group">
    <label>Role</label>
    <select id="role">
      <option value="Employee">Employee</option>
      <option value="Admin">Admin</option>
    </select>
  </div>
  <div class="form-group">
    <label>Facility Access</label>
    <input type="text" id="facilityAccess">
  </div>
  <div class="form-group">
    <label>Notes</label>
    <textarea id="notes" rows="3"></textarea>
  </div>
  <button class="btn-yellow" id="saveBtn">Save & Sync to Google Sheet</button>
</div>

<script>
// Update this line in both of your HTML files
const API_URL = 'https://script.google.com/macros/s/AKfycbwd_Zkshsq6w6tJ5sYyptdAbhrmsmz0D6ChmmReuDw_eRz4PhAMib1qPsROxc_9su6stA/exec';

  // 1. Load data from URL parameter on startup
  window.onload = async () => {
    const params = new URLSearchParams(window.location.search);
    const name = params.get('name');
    if (name) {
      document.getElementById('employeeName').value = name;
      const resp = await fetch(API_URL + '?sheet=Employees');
      const data = await resp.json();
      const user = data.find(e => e.employeeName === name);
      if (user) {
        document.getElementById('pin').value = user.loginPin || '';
        document.getElementById('role').value = user.role || 'Employee';
        document.getElementById('facilityAccess').value = user.allowedFacilities || '';
        document.getElementById('notes').value = user.notes || '';
      }
    }
  };

  // 2. Save data back to Sheet
  document.getElementById('saveBtn').onclick = async () => {
    const btn = document.getElementById('saveBtn');
    btn.innerText = "Syncing...";
    btn.disabled = true;

    const payload = {
      sheet: "Employees",
      data: {
        employeeName: document.getElementById('employeeName').value,
        loginPin: document.getElementById('pin').value,
        role: document.getElementById('role').value,
        allowedFacilities: document.getElementById('facilityAccess').value,
        notes: document.getElementById('notes').value
      }
    };

    try {
      await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
      alert("Employee Updated Successfully!");
    } catch (e) {
      alert("Error saving data.");
    } finally {
      btn.innerText = "Save & Sync to Google Sheet";
      btn.disabled = false;
    }
  };
</script>
</body>
</html>
