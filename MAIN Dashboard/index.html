<!DOCTYPE html>
<html lang="en">
<head>
  <!-- =========================
       01 - HEAD
  ========================== -->

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>MAIN Dashboard</title>

  <style>
    /* =========================
       02 - GLOBAL STYLE
    ========================== */

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f2f2f2;
      min-height: 100vh;
      padding: 10px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .app {
      width: 100%;
      max-width: 430px;
      background: #ffffff;
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.18);
    }

    .title {
      font-size: 23px;
      font-weight: 900;
      margin: 0;
      text-align: center;
      line-height: 1.1;
    }

    .tag {
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      color: #555;
      margin-top: 5px;
      margin-bottom: 14px;
    }

    .card-box {
      border: 2px dashed #d2d2d2;
      border-radius: 16px;
      background: #fafafa;
      padding: 12px;
      margin-bottom: 12px;
    }

    .box-title {
      font-size: 17px;
      font-weight: 900;
      text-align: center;
      margin-bottom: 10px;
      color: #111;
    }

    .input,
    .select {
      width: 100%;
      border: 1px solid #bbb;
      border-radius: 12px;
      padding: 12px;
      font-size: 16px;
      font-weight: 700;
      outline: none;
      margin-bottom: 8px;
      background: white;
    }

    .main-btn {
      width: 100%;
      border: none;
      background: #222;
      color: #ffffff;
      border-radius: 12px;
      padding: 12px;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      margin-bottom: 8px;
    }

    .login-btn {
      width: 100%;
      border: none;
      background: #f4c542;
      color: #111;
      border-radius: 12px;
      padding: 13px;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
    }

    .facility-list {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 10px;
    }

    .facility-btn {
      border: none;
      background: #f4c542;
      color: #111;
      border-radius: 14px;
      padding: 16px 10px;
      font-size: 21px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 3px 8px rgba(0,0,0,0.18);
      text-align: center;
      min-height: 58px;
    }

    .facility-name {
      display: block;
      font-size: 10px;
      font-weight: 800;
      margin-top: 3px;
      color: #333;
      line-height: 1.1;
    }

    .empty-text {
      font-size: 14px;
      font-weight: 800;
      color: #777;
      text-align: center;
      padding: 12px;
      grid-column: 1 / -1;
    }

    .status {
      display: none;
      margin-top: 8px;
      padding: 10px;
      border-radius: 12px;
      background: #eeeeee;
      font-size: 13px;
      font-weight: 800;
      text-align: center;
      color: #333;
    }

    .status.active {
      display: block;
    }

    .version {
      margin-top: 14px;
      text-align: center;
      font-size: 11px;
      color: #777;
    }

    .main-btn:active,
    .login-btn:active,
    .facility-btn:active {
      transform: scale(0.98);
    }
  </style>
</head>

<body>
  <!-- =========================
       03 - APP SHELL
  ========================== -->

  <main class="app">
    <h1 class="title">MAIN Dashboard</h1>
    <div class="tag">Facility Layout App</div>

    <section class="card-box">
      <div class="box-title">Create New Facility</div>

      <input
        id="newFacilityInput"
        class="input"
        type="text"
        placeholder="Enter new facility"
        autocomplete="off"
      >

      <button class="main-btn" onclick="saveNewFacility()">
        Save Facility
      </button>

      <div id="statusBox" class="status"></div>
    </section>

    <section class="card-box">
      <div class="box-title">Facility Login</div>

      <select id="facilitySelect" class="select">
        <option value="">Create new facility</option>
      </select>

<input
  id="loginInput"
  class="input"
  type="password"
  placeholder="Enter 4 digit login"
  autocomplete="off"
  inputmode="numeric"
  maxlength="4"
  pattern="[0-9]*"
  oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 4);"
>

      <button class="login-btn" onclick="loginToSelectedFacility()">
        Login
      </button>
    </section>

    <section id="facilityList" class="facility-list">
      <div class="empty-text">No facilities added yet.</div>
    </section>

    <div class="version">
      Updated: 2026-05-23 10:25 AM • MAIN Dashboard/index.html
    </div>
  </main>

  <script>
    /* =========================
       04 - STORAGE
    ========================== */

    const STORAGE_KEY = "facilityLayoutFacilitiesV1";

    let facilities = [];

    /* =========================
       05 - STARTUP
    ========================== */

    document.addEventListener("DOMContentLoaded", () => {
      loadFacilities();
      renderAll();

      document.getElementById("newFacilityInput").addEventListener("keydown", event => {
        if (event.key === "Enter") {
          saveNewFacility();
        }
      });

      document.getElementById("loginInput").addEventListener("keydown", event => {
        if (event.key === "Enter") {
          loginToSelectedFacility();
        }
      });
    });

    /* =========================
       06 - LOAD AND SAVE
    ========================== */

    function loadFacilities() {
      const saved = localStorage.getItem(STORAGE_KEY);

      if (!saved) {
        facilities = [];
        return;
      }

      try {
        facilities = JSON.parse(saved);
      } catch (error) {
        facilities = [];
      }
    }

    function saveFacilities() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(facilities));
    }

    /* =========================
       07 - CREATE FACILITY
    ========================== */

    function saveNewFacility() {
      const input = document.getElementById("newFacilityInput");
      const facilityName = input.value.trim();

      if (!facilityName) {
        showStatus("Enter a facility name first.");
        return;
      }

      const alreadyExists = facilities.some(facility => {
        return facility.name.toLowerCase() === facilityName.toLowerCase();
      });

      if (alreadyExists) {
        showStatus("That facility already exists.");
        return;
      }

      const initials = makeInitials(facilityName);

      facilities.push({
        id: initials,
        name: facilityName,
        initials: initials,
        folder: initials
      });

      saveFacilities();
      input.value = "";

      renderAll();
      showStatus("Facility saved.");
    }

    function makeInitials(name) {
      const cleanName = String(name || "").trim();

      if (!cleanName) return "NEW";

      if (cleanName.includes("/")) {
        const beforeSlash = cleanName.split("/")[0].trim();
        const cleaned = beforeSlash.replace(/[^a-zA-Z0-9]/g, "");
        return cleaned.substring(0, 4).toUpperCase() || "NEW";
      }

      const words = cleanName
        .replace(/[^a-zA-Z0-9 ]/g, " ")
        .split(" ")
        .filter(Boolean);

      if (!words.length) return "NEW";

      if (words.length === 1) {
        return words[0].substring(0, 4).toUpperCase();
      }

      return words
        .map(word => word[0])
        .join("")
        .substring(0, 4)
        .toUpperCase();
    }

    /* =========================
       08 - RENDER
    ========================== */

    function renderAll() {
      renderDropdown();
      renderFacilityButtons();
    }

    function renderDropdown() {
      const select = document.getElementById("facilitySelect");

      if (!facilities.length) {
        select.innerHTML = '<option value="">Create new facility</option>';
        return;
      }

      select.innerHTML =
        '<option value="">Create new facility</option>' +
        facilities.map((facility, index) => {
          return `
            <option value="${index}">
              ${escapeHtml(facility.initials)} - ${escapeHtml(facility.name)}
            </option>
          `;
        }).join("");
    }

    function renderFacilityButtons() {
      const facilityList = document.getElementById("facilityList");

      if (!facilities.length) {
        facilityList.innerHTML = '<div class="empty-text">No facilities added yet.</div>';
        return;
      }

      facilityList.innerHTML = facilities.map((facility, index) => {
        return `
          <button class="facility-btn" onclick="chooseFacility(${index})">
            ${escapeHtml(facility.initials)}
            <span class="facility-name">${escapeHtml(facility.name)}</span>
          </button>
        `;
      }).join("");
    }

    /* =========================
       09 - LOGIN
    ========================== */

    function chooseFacility(index) {
      document.getElementById("facilitySelect").value = String(index);
      document.getElementById("loginInput").focus();
    }

    function loginToSelectedFacility() {
      const select = document.getElementById("facilitySelect");
      const loginInput = document.getElementById("loginInput");

      const selectedIndex = select.value;
      const loginValue = loginInput.value.trim();

      if (selectedIndex === "") {
        showStatus("Select or create a facility first.");
        return;
      }

      if (!loginValue) {
        showStatus("Enter login first.");
        return;
      }

      const facility = facilities[Number(selectedIndex)];

      if (!facility) {
        showStatus("Facility not found.");
        return;
      }

      openFacility(facility);
    }

    function openFacility(facility) {
      const url =
        "../" + encodeURIComponent(facility.folder) + "/index.html" +
        "?facilityId=" + encodeURIComponent(facility.id) +
        "&facilityName=" + encodeURIComponent(facility.name);

      window.location.href = url;
    }

    /* =========================
       10 - STATUS
    ========================== */

    function showStatus(message) {
      const statusBox = document.getElementById("statusBox");
      statusBox.innerText = message;
      statusBox.classList.add("active");

      setTimeout(() => {
        statusBox.classList.remove("active");
      }, 2500);
    }

    /* =========================
       11 - HELPERS
    ========================== */

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
