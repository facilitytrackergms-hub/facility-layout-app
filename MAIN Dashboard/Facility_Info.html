<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Facility Info - Responsive</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 10px; color: #2c3e50; background-color: #f0f2f5; }
    h1 { text-align: center; font-size: 1.5rem; }

    /* Desktop Table Styles */
    .table-container { width: 100%; overflow-x: auto; background: white; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    table { width: 100%; border-collapse: collapse; }
    th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
    th { background-color: #f8f9fa; font-weight: 600; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em; }
    
    .input-cell { 
        width: 100%; border: 1px solid transparent; background: transparent; 
        font-family: inherit; font-size: 0.9rem; color: inherit; resize: none;
    }
    .input-cell:focus { border-color: #3498db; background: #fff; outline: none; border-radius: 4px; }

    /* Mobile "Card" Layout */
    @media screen and (max-width: 768px) {
        /* Hide the table header */
        thead { display: none; }
        
        table, tbody, tr, td { display: block; width: 100%; }
        
        tr { margin-bottom: 20px; border: 1px solid #ddd; border-radius: 10px; background: #fff; padding: 10px; box-sizing: border-box; }
        
        td { 
            border: none; position: relative; padding-left: 45%; 
            margin-bottom: 8px; min-height: 30px; display: flex; align-items: center;
        }

        /* Create labels for each row using data-label attributes */
        td::before {
            content: attr(data-label);
            position: absolute; left: 10px; width: 40%;
            font-weight: bold; font-size: 0.75rem; color: #7f8c8d;
            text-transform: uppercase;
        }

        .input-cell { border: 1px solid #eee; background: #fafafa; padding: 5px; border-radius: 4px; }
    }
</style>
</head>
<body>

<h1>Facility Info</h1>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Type</th>
                <th>City</th>
                <th>Manager</th>
                <th>Phone</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td data-label="Facility ID"><textarea class="input-cell">F_001</textarea></td>
                <td data-label="Name"><textarea class="input-cell">Grace Manor Suites</textarea></td>
                <td data-label="Type"><textarea class="input-cell">Assisted Living</textarea></td>
                <td data-label="City"><textarea class="input-cell">Lakeland</textarea></td>
                <td data-label="Manager"><textarea class="input-cell">Berry</textarea></td>
                <td data-label="Main Phone"><textarea class="input-cell">863-555-0100</textarea></td>
            </tr>
            </tbody>
    </table>
</div>

</body>
</html>
