<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Facility Info - Stacked Layout</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body { 
        font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto; 
        margin: 0; 
        padding: 15px; 
        background-color: #f4f7f6; 
        color: #333;
    }

    h1 { font-size: 1.4rem; color: #2c3e50; margin-bottom: 20px; text-align: center; }

    /* Container for each "Facility" card */
    .facility-card {
        background: #fff;
        border-radius: 12px;
        padding: 20px;
        margin-bottom: 25px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        border: 1px solid #e1e4e8;
    }

    /* The Stacked Group */
    .input-group {
        display: flex;
        flex-direction: column; /* This stacks them vertically */
        margin-bottom: 15px;
    }

    .input-group label {
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        color: #7f8c8d;
        margin-bottom: 5px;
        letter-spacing: 0.03em;
    }

    .input-field {
        width: 100%;
        padding: 12px;
        border: 1px solid #dcdde1;
        border-radius: 8px;
        font-size: 1rem;
        font-family: inherit;
        background-color: #fafafa;
        box-sizing: border-box; /* Prevents padding from breaking width */
        transition: border-color 0.2s;
    }

    .input-field:focus {
        outline: none;
        border-color: #3498db;
        background-color: #fff;
        box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.1);
    }

    /* Grid for Desktop - side by side if screen is wide */
    @media (min-width: 600px) {
        .card-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
    }
</style>
</head>
<body>

    <h1>Facility Manager</h1>

    <div class="facility-card">
        <div class="card-grid">
            <div class="input-group">
                <label>Facility ID</label>
                <input type="text" class="input-field" value="F_001">
            </div>

            <div class="input-group">
                <label>Facility Name</label>
                <input type="text" class="input-field" value="Grace Manor Suites">
            </div>

            <div class="input-group">
                <label>Facility Type</label>
                <input type="text" class="input-field" value="Assisted Living">
            </div>

            <div class="input-group">
                <label>Main Phone</label>
                <input type="tel" class="input-field" value="863-555-0100">
            </div>
            
            <div class="input-group">
                <label>Manager Name</label>
                <input type="text" class="input-field" value="Berry">
            </div>

            <div class="input-group">
                <label>City</label>
                <input type="text" class="input-field" value="Lakeland">
            </div>
        </div>

        <div class="input-group" style="margin-top: 10px;">
            <label>Notes</label>
            <textarea class="input-field" rows="3">Starter facility info for testing</textarea>
        </div>
    </div>
    </body>
</html>
